name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: easy-airsoft-terraform-state
  TF_LOCK_TABLE: easy-airsoft-terraform-lock

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform backend (S3 + DynamoDB)
        run: |
          set -euo pipefail

          echo "Checking Terraform state bucket: ${TF_STATE_BUCKET}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "State bucket already exists"
          else
            echo "Creating state bucket"
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          echo "Checking Terraform lock table: ${TF_LOCK_TABLE}"
          if aws dynamodb describe-table --table-name "${TF_LOCK_TABLE}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "Lock table already exists"
          else
            echo "Creating lock table"
            aws dynamodb create-table \
              --table-name "${TF_LOCK_TABLE}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${AWS_REGION}"

            aws dynamodb wait table-exists \
              --table-name "${TF_LOCK_TABLE}" \
              --region "${AWS_REGION}"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Validate VITE_API_URL input
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_API_URL:-}" ]; then
            echo "VITE_API_URL is empty. Configure repository variable VITE_API_URL in GitHub Actions variables."
            exit 1
          fi

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_vite_api_url: ${{ vars.VITE_API_URL }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_vite_api_url: ${{ vars.VITE_API_URL }}

      - name: Show Outputs
        run: terraform output
